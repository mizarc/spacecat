name: 🐛 Bug Report
description: Report a bug to help us improve.
labels: ["type: hotfix"]
body:
  - type: textarea
    id: description
    attributes:
      label: 📖 Bug Description
      placeholder: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 🧪 Steps to Reproduce
      placeholder: |
        Please provide a numbered list:
        1. Run command...
        2. Provide input...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 🎯 Expected Behavior
      placeholder: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 🐛 Actual Behavior
      placeholder: What actually happened. Include error logs or stack traces if available.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: 📸 Screenshots / Logs
      placeholder: (Optional) If applicable, add screenshots, console logs, or error output.
  - type: input
    id: node_version
    attributes:
      label: 🟢 Node.js Version
      placeholder: "e.g. Node.js 24, Node.js 22"
    validations:
      required: true
  - type: dropdown
    id: adapter
    attributes:
      label: 🤖 Bot Adapter
      description: Which platform(s) are you running the bot on?
      multiple: true
      options:
        - Discord
        - Fluxer
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: 🐳 Deployment Method
      options:
        - Docker
        - Local (Node.js)
    validations:
      required: true
  - type: dropdown
    id: storage
    attributes:
      label: 🗄️ Storage Backend
      options:
        - SQLite
        - PostgreSQL
    validations:
      required: true
  - type: input
    id: bot_version
    attributes:
      label: 🏷️ Bot Version
      placeholder: "e.g. latest from main, v1.0.0, commit abc1234"
    validations:
      required: true
  - type: textarea
    id: fix
    attributes:
      label: 💡 Possible Fix
      placeholder: (Optional) If you have an idea of where the issue lies.
  - type: checkboxes
    id: checklist
    attributes:
      label: 🏁 Checklist
      options:
        - label: I have checked existing issues to ensure this hasn't been reported before.
          required: true
        - label: I have tested with the default configuration (if applicable).
          required: false
        - label: I am running a supported version of the software.
          required: true
