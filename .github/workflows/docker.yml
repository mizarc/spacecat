# Docker — builds and pushes images to GHCR on merges and tags.
# Not triggered on PRs — only on actual commits to main/production.

name: Docker

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main, production]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/astrokat

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # staging tag for every main merge
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/main' }}
            # latest and semver for production/tags
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/production' || startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern=v{{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # always tag with the commit SHA for traceability
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
