# CI pipeline — runs on every push and pull request against main.
# If tests and type-check pass, Dependabot PRs can be auto-merged.
# See: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run build

      - name: Run tests
        run: npm test

  docker:
    if: github.ref == 'refs/heads/production' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/astrokat:latest
            ghcr.io/${{ github.repository_owner }}/astrokat:${{ github.sha }}
