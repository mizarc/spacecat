# Release — runs when a semver tag (v*) is pushed.
# Extracts the matching section from CHANGELOG.md and creates a draft GitHub Release
# with a pinned docker-compose.yml and .env.example, both referencing the released image tag.

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract the structured changelog section for this version
          awk -v ver="[$VERSION]" '
            /^## / {
              if (found) exit
              if (index($0, "## " ver " - ") == 1 || index($0, "## " ver " ") == 1) found=1
              next
            }
            found { print }
          ' CHANGELOG.md > changelog-extract.md

          # Compose the full release page: placeholder intro + changelog
          cat > release-notes.md <<- EOF
          <!--
          Write your release summary here.
          Talk about highlights, breaking changes, upgrade notes, etc.
          -->

          Docker images:
          \`\`\`
          docker pull ghcr.io/mizarc/astrokat:${VERSION}
          \`\`\`

          $(cat changelog-extract.md)

          ---

          See the [CHANGELOG](https://github.com/mizarc/astrokat/blob/main/CHANGELOG.md) for the full history.
          EOF

      - name: Prepare release assets
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Zip destination for release assets
          mkdir -p release-assets

          # Pin the version tag and strip build: . (release assets target pre-built image users)
          sed -i "s|image: ghcr.io/mizarc/astrokat:latest|image: ghcr.io/mizarc/astrokat:${VERSION}|" \
            docker-compose.yml
          sed -i '/^\s*build: \./d' docker-compose.yml

          # Bundle into a single zip — preserves .env.example naming, one download
          cp docker-compose.yml .env.example release-assets/

          cat > release-assets/README.txt <<- README
          ╔══════════════════════════════════════════════════╗
          ║  Astrokat ${GITHUB_REF_NAME}                               ║
          ╚══════════════════════════════════════════════════╝

          1. Copy the environment template:
             cp .env.example .env

          2. Edit .env with your bot tokens (see docs for how to obtain them).

          3. Start the bot:
             docker compose up

          Docs:  https://github.com/mizarc/astrokat#readme
          Issues: https://github.com/mizarc/astrokat/issues
          README

          cd release-assets
          zip "astrokat-${GITHUB_REF_NAME}.zip" docker-compose.yml .env.example README.txt

      - name: Create Draft Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --draft \
            release-assets/astrokat-*.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}